name: Appreciate
options:
  bundleIdPrefix: com.appreciate
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Appreciate:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Appreciate/Sources
        type: group
    resources:
      - path: Appreciate/Resources
        type: group
    dependencies:
      - package: Supabase
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Appreciate"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Appreciate needs access to your photos to attach images to your gratitude posts."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"Appreciate/Resources/Preview Content\""
        ENABLE_PREVIEWS: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.appreciate.app
        PRODUCT_NAME: Appreciate
        SWIFT_EMIT_LOC_STRINGS: YES
